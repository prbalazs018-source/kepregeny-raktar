<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Képregény Raktár</title>
<link rel="stylesheet" href="style.css">

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0f0f14">
</head>

<body>

<h1>📚 Képregény Raktár</h1>

<!-- FORM -->
<div class="form-box">
  <input id="title" placeholder="Cím">
  <input id="publisher" placeholder="Kiadó">

  <select id="status">
    <option>Nem olvasott</option>
    <option>Olvasott</option>
  </select>

  <label>
    Wishlist
    <input type="checkbox" id="wishlist">
  </label>

  <input type="file" id="cover">

  <button onclick="addComic()">➕ Hozzáadás</button>
</div>

<!-- KERESŐ -->
<input id="search" placeholder="Keresés..." oninput="renderComics()">

<!-- LISTA -->
<div id="comic-list"></div>

<!-- FIREBASE + APP -->
<script type="module">

// 1. Firebase init
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  getDocs,
  deleteDoc,
  doc,
  updateDoc
} from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "XXX",
  authDomain: "XXX",
  projectId: "XXX",
  storageBucket: "XXX",
  messagingSenderId: "XXX",
  appId: "XXX"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const comicsRef = collection(db, "comics");

// 2. globálissá tesszük
window.db = db;
window.comicsRef = comicsRef;
window.firestore = { addDoc, getDocs, deleteDoc, doc, updateDoc };

</script>

<script src="app.js"></script>

</body>
</html>
