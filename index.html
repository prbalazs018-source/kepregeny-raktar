<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Képregény Raktár</title>
<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f0f14">
</head>
<body>

<h1>📚 Képregény Raktár</h1>

<!-- STATISZTIKA -->
<div class="stats">
  <div>📦 Összes: <span id="stat-total">0</span></div>
  <div>⭐ Wishlist: <span id="stat-wishlist">0</span></div>
  <div>📖 Olvasott: <span id="stat-read">0</span></div>
</div>

<!-- FORM -->
<div class="form-box">
  <input type="text" id="title" placeholder="Cím">
  <input type="text" id="publisher" placeholder="Kiadó">

  <select id="status">
    <option value="Nem olvasott">Nem olvasott</option>
    <option value="Olvasott">Olvasott</option>
  </select>

  <label>
    Wishlist
    <input type="checkbox" id="wishlist">
  </label>

  <input type="file" id="cover">

  <button onclick="addComic()">➕ Hozzáadás</button>
</div>

<!-- KERESŐ + RENDEZÉS -->
<div class="top-bar">
  <input type="text" id="search" placeholder="🔎 Keresés..." oninput="renderComics()">

  <select id="sort" onchange="renderComics()">
    <option value="new">Legújabb</option>
    <option value="old">Legrégebbi</option>
    <option value="az">A-Z</option>
    <option value="za">Z-A</option>
  </select>
</div>

<!-- TABOK -->
<div class="tabs">
  <button onclick="setTab('all')">Összes</button>
  <button onclick="setTab('wishlist')">Wishlist</button>
  <button onclick="setTab('read')">Olvasott</button>
</div>

<!-- LISTA -->
<div id="comic-list"></div>

<script src="app.js"></script>
</body>
</html>
